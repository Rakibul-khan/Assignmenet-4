<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <!-- Google fonts cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- tailwindcss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="w-10/12 mx-auto bg-gray-200">
    <h1 class="text-4xl py-5 font-bold">Job Application Tracker</h1>
    <!-- Count sections -->
    <section class="grid grid-cols-3 gap-5">
      <div class="shadow p-4 rounded-lg">
        <h1>Total</h1>
        <h2 class="text-[22px] font-semibold">8</h2>
      </div>
      <div class="shadow p-4 rounded-lg">
        <h1>Interview</h1>
        <h2 class="text-[22px] font-semibold text-green-600">0</h2>
      </div>
      <div class="shadow p-4 rounded-lg">
        <h1>Rejected</h1>
        <h2 class="text-[22px] font-semibold text-red-600">0</h2>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
